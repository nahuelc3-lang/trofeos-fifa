<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Torneos Oficiales – FC 26</title>

  <!-- Vista responsive -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fuente estilo FC -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Script modelos 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      background-image: url('fondo.png');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      background-repeat: no-repeat;
    }

    h1 {
      color: white;
      text-align: center;
      font-size: 48px;
      font-weight: 900;
      letter-spacing: 3px;
      padding: 30px 0;
    }

    .layout {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 40px;
      padding: 40px;
    }

    .trofeos {
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
    }

    .copa {
      text-align: center;
    }

    model-viewer {
      width: 300px;
      height: 400px;
    }

    h3 {
      color: white;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .video-container {
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    video {
      width: 100%;
      max-width: 350px;
      border-radius: 15px;
    }

    /* 📱 RESPONSIVE PARA CELULAR */
    @media (max-width: 900px) {

      h1 {
        font-size: 32px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .trofeos {
        justify-content: center;
      }

      model-viewer {
        width: 260px;
        height: 350px;
      }

      .video-container {
        margin-top: 30px;
      }

      video {
        max-width: 90%;
      }
    }
  </style>
</head>

<body>

<h1>Torneos Oficiales – FC 26</h1>

<div class="layout">

  <!-- TROFEOS -->
  <div class="trofeos">

    <div class="copa">
      <model-viewer src="AFA_LPF.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
      <h3>AFA Clausura 2025</h3>
    </div>

    <div class="copa">
      <model-viewer src="CONMEBOL_Libertadores.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
      <h3>CONMEBOL Libertadores 2025</h3>
    </div>

    <div class="copa">
      <model-viewer src="CONMEBOL_Sudamericana.glb" auto-rotate camera-controls shadow-intensity="1"></model-viewer>
      <h3>CONMEBOL Sudamericana 2025</h3>
    </div>

  </div>

  <!-- VIDEO -->
  <div class="video-container">
    <video src="intro.mp4" autoplay muted loop playsinline></video>
  </div>

</div>

</body>
</html>
