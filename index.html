<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Torneos Oficiales – FC 26</title>

  <!-- Fuente estilo FC -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- Script modelos 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="
  margin:0;
  font-family:'Montserrat', sans-serif;
  background-image:url('fondo.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  background-repeat:no-repeat;
">

<h1 style="
  color:white;
  text-align:center;
  font-size:48px;
  font-weight:900;
  letter-spacing:3px;
  padding:30px 0;
">
Torneos Oficiales – FC 26
</h1>

<div style="display:grid; grid-template-columns: 3fr 1fr; gap:40px; padding:40px;">

  <!-- TROFEOS -->
  <div style="display:flex; gap:40px; flex-wrap:wrap;">

    <div style="text-align:center;">
      <model-viewer 
        src="AFA_LPF.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="
        color:white;
        font-weight:700;
        letter-spacing:1px;
      ">
        AFA Clausura 2025
      </h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Libertadores.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="
        color:white;
        font-weight:700;
        letter-spacing:1px;
      ">
        CONMEBOL Libertadores 2025
      </h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Sudamericana.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="
        color:white;
        font-weight:700;
        letter-spacing:1px;
      ">
        CONMEBOL Sudamericana 2025
      </h3>
    </div>

  </div>

  <!-- VIDEO -->
  <div style="display:flex; justify-content:center; align-items:flex-start;">
    <video 
      src="intro.mp4"
      autoplay
      muted
      loop
      playsinline
      style="
        width:100%;
        max-width:350px;
        border-radius:15px;
      ">
    </video>
  </div>

</div>

</body>
</html>
