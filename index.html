<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="background:black; margin:0; font-family:Arial;">

<h1 style="
  color:white;
  text-align:center;
  font-size:40px;
  margin-top:20px;
">
Competencias actuales FIFA
</h1>

<div style="display:flex; flex-wrap:wrap;">

  <!-- BLOQUE TROFEOS -->
  <div style="
    flex:3;
    min-width:900px;
    display:flex;
    justify-content:center;
    gap:40px;
    padding:60px;
    background-image:url('Fondo.png');
    background-size:600px;
    background-repeat:no-repeat;
    background-position:center;
  ">

    <div style="text-align:center;">
      <model-viewer 
        src="AFA_LPF.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">AFA Clausura 2025</h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Libertadores.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">CONMEBOL Libertadores 2025</h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Sudamericana.glb"
        auto-rotate
        camera-controls
        shadow-intensity="1"
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">CONMEBOL Sudamericana 2025</h3>
    </div>

  </div>

  <!-- VIDEO DERECHA -->
  <div style="
    flex:1;
    min-width:300px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
  ">
    <video 
      src="intro.mp4"
      autoplay
      muted
      loop
      playsinline
      style="
        width:100%;
        max-width:400px;
        border-radius:15px;
      ">
    </video>
  </div>

</div>

</body>
</html>
