<!DOCTYPE html>
<html>
<head>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="background:black; margin:0;">

<h1 style="color:white; text-align:center; font-size:40px; margin-top:20px;">
Competencias actuales FIFA
</h1>

<div style="display:flex; justify-content:flex-start; gap:40px; flex-wrap:wrap; margin-top:40px; padding:40px;">

  <div style="text-align:center;">
    <model-viewer 
      src="AFA_LPF.glb"
      auto-rotate
      camera-controls
      style="width: 300px; height: 400px;">
    </model-viewer>
    <h3 style="color:white;">AFA Clausura 2025</h3>
  </div>

  <div style="text-align:center;">
    <model-viewer 
      src="CONMEBOL_Libertadores.glb"
      auto-rotate
      camera-controls
      style="width: 300px; height: 400px;">
    </model-viewer>
    <h3 style="color:white;">CONMEBOL Libertadores 2025</h3>
  </div>

  <div style="text-align:center;">
    <model-viewer 
      src="CONMEBOL_Sudamericana.glb"
      auto-rotate
      camera-controls
      style="width: 300px; height: 400px;">
    </model-viewer>
    <h3 style="color:white;">CONMEBOL Sudamericana 2025</h3>
  </div>

</div>

</body>
</html>
