<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Torneo FIFA</title>

  <!-- Script necesario para que funcionen los modelos 3D -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body style="
  margin:0;
  font-family:Arial;
  background-image:url('Fondo.png');
  background-size:cover;
  background-position:center;
  background-attachment:fixed;
  background-repeat:no-repeat;
">

<h1 style="color:white; text-align:center; font-size:40px; padding:20px 0;">
Competencias actuales FIFA
</h1>

<div style="display:grid; grid-template-columns: 3fr 1fr; gap:40px; padding:40px;">

  <!-- TROFEOS -->
  <div style="display:flex; gap:40px; flex-wrap:wrap;">

    <div style="text-align:center;">
      <model-viewer 
        src="AFA_LPF.glb"
        auto-rotate
        camera-controls
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">AFA Clausura 2025</h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Libertadores.glb"
        auto-rotate
        camera-controls
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">CONMEBOL Libertadores 2025</h3>
    </div>

    <div style="text-align:center;">
      <model-viewer 
        src="CONMEBOL_Sudamericana.glb"
        auto-rotate
        camera-controls
        style="width:300px; height:400px;">
      </model-viewer>
      <h3 style="color:white;">CONMEBOL Sudamericana 2025</h3>
    </div>

  </div>

  <!-- VIDEO -->
  <div style="display:flex; justify-content:center; align-items:flex-start;">
    <video 
      src="intro.mp4"
      autoplay
      muted
      loop
      playsinline
      style="width:100%; max-width:350px; border-radius:15px;">
    </video>
  </div>

</div>

</body>
</html>
